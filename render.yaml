services:
  - type: web
    name: radhika-agencies
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NOTIFY_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: ADMIN_SECRET
        sync: false
